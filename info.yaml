# Tiny Tapeout project information
project:
  title:        "UART_Controller"      # Project title
  author:       "Preetish"      # Your name
  discord:      "preetish_37870"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Programmable through UART, I can choose between Analog circuits like Inverters"      # One line description of what your project does
  language:     "Mixed Signal (Verilog + xschem)" # other examples include Verilog, Amaranth, VHDL, etc
  clock_hz:     1843200       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"          # Valid values for analog projects: 1x2, 2x2

  # How many analog pins does your project use?
  analog_pins: 4        # Valid values: 0 to 6
  uses_3v3: false       # Set to true if your project uses 3.3V (VAPWR) in addition to 1.8V (VDPWR)

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_pree"

  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:        
    - "full_controller.v"
    - "uart3.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "baud_mode[0]"
  ui[1]: "baud_mode[1]"
  ui[2]: "rx_uart"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "led"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins - make sure to also set "analog_pins" above, else the pins won't be connected
  ua[0]: "ex4"
  ua[1]: "ex3"
  ua[2]: "ex2"
  ua[3]: "ex1"
  ua[4]: ""
  ua[5]: ""

# Do not change!
yaml_version: 6
